<form method="POST" action="{{ url }}" class="inline" onsubmit="return confirm('{{ confirm|escapejs }}');">
    {% csrf_token %}
    <button type="submit" class="hr-act hr-act--delete" title="{{ title|default:'حذف' }}" aria-label="{{ title|default:'حذف' }}">
        <i data-lucide="trash-2" class="hr-act__icon"></i>
    </button>
</form>
