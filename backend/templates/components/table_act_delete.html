<form method="POST" action="{{ url }}" class="{% if form_class %}{{ form_class }}{% else %}inline{% endif %}" onsubmit="return confirm('{{ confirm|escapejs }}');">
    {% csrf_token %}
    <button type="submit" class="hr-act hr-act--delete{% if extra_class %} {{ extra_class }}{% endif %}" title="{{ title|default:'حذف' }}" aria-label="{{ title|default:'حذف' }}">
        <i data-lucide="trash-2" class="hr-act__icon"></i>
    </button>
</form>
