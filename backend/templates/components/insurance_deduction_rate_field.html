{# نسبة خصم التأمينات — قائمة GOSI للسعودي، حقل رقمي لغير السعودي #}
<div class="space-y-1.5">
    <label class="block text-xs font-bold text-slate-800">
        نسبة خصم التأمينات (%)
        <span x-show="isSaudi()" class="block text-[10px] font-normal text-slate-500 mt-0.5">سعودي — 10.75 / 10.25 / 9.75</span>
    </label>
    <select :name="isSaudi() ? 'insurance_deduction_rate' : null"
            x-show="isSaudi()"
            x-cloak
            x-model.number="insuranceRate"
            :disabled="!isSaudi() || {% if not can_edit %}true{% else %}false{% endif %}"
            class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm bg-white font-mono"
            dir="ltr">
        <option value="">-- اختر --</option>
        <option value="10.75">10.75%</option>
        <option value="10.25">10.25%</option>
        <option value="9.75">9.75%</option>
    </select>
    <input type="number"
           step="0.01"
           :name="!isSaudi() ? 'insurance_deduction_rate' : null"
           x-show="!isSaudi()"
           x-cloak
           x-model.number="insuranceRate"
           :disabled="isSaudi() || {% if not can_edit %}true{% else %}false{% endif %}"
           class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm bg-white font-mono"
           dir="ltr">
    {% if not can_edit and rate is not None %}
    <input type="hidden" name="insurance_deduction_rate" value="{{ rate|default:'' }}">
    {% endif %}
</div>
