{% load custom_tags %}
<!-- Form Field Component -->
<div {% if full_width %}class="md:col-span-2"{% endif %}>
    <label class="block text-xs md:text-sm font-medium text-slate-700 mb-1">
        {{ label }}{% if required %} *{% endif %}
    </label>
    
    {% if field_type == 'textarea' %}
    <textarea 
        name="{{ name }}"
        {% if required %}required{% endif %}
        rows="{{ rows|default:3 }}"
        class="w-full px-3 py-2 text-sm md:text-base border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 hr-glass-input"
        placeholder="{{ placeholder|default:'' }}"
    >{{ value|default:'' }}</textarea>
    
    {% elif field_type == 'select' %}
    <select 
        name="{{ name }}"
        {% if required %}required{% endif %}
        class="w-full px-3 py-2 text-sm md:text-base border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 hr-glass-input"
    >
        <option value="">-- اختر --</option>
        {% for option in options %}
        <option value="{{ option.value }}" {% if option.value == value %}selected{% endif %}>
            {{ option.label }}
        </option>
        {% endfor %}
    </select>
    
    {% else %}
    <input 
        type="{{ field_type|default:'text' }}"
        name="{{ name }}"
        {% if required %}required{% endif %}
        {% if step %}step="{{ step }}"{% endif %}
        class="w-full px-3 py-2 text-sm md:text-base border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 hr-glass-input"
        placeholder="{{ placeholder|default:'' }}"
        value="{% if field_type == 'number' %}{{ value|input_decimal|default:'' }}{% else %}{{ value|default:'' }}{% endif %}"
    >
    {% endif %}
    
</div>
