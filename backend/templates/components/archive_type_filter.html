{# داخل نطاق archivePager — filterOpen, filterLabel(), filterOptionsList, setFilter() #}
<div class="hr-atf shrink-0 min-w-[11.5rem] w-full sm:w-[12.5rem]"
     :class="filterOpen && 'is-open'"
     @click.outside="filterOpen = false"
     @keydown.escape.window="filterOpen = false">
    <button type="button"
            class="hr-atf__btn w-full text-sm bg-white text-right flex items-center justify-between gap-2"
            @click.stop="filterOpen = !filterOpen; $nextTick(() => { if (window.lucide) lucide.createIcons(); })"
            :aria-expanded="filterOpen ? 'true' : 'false'"
            aria-haspopup="listbox"
            :aria-label="'تصفية حسب النوع: ' + filterLabel()">
        <span class="hr-atf__btn-body min-w-0 flex-1">
            <span class="hr-atf__btn-kicker">نوع السجل</span>
            <span class="hr-atf__btn-value truncate" x-text="filterLabel()"></span>
        </span>
        <i data-lucide="chevron-down"
           class="hr-atf__chevron-icon w-4 h-4 shrink-0"
           :class="filterOpen && 'is-open'"
           aria-hidden="true"></i>
    </button>
    <div x-show="filterOpen"
         x-cloak
         class="hr-atf__menu"
         role="listbox"
         aria-label="خيارات نوع السجل">
        <template x-for="opt in filterOptionsList" :key="opt.value">
            <button type="button"
                    role="option"
                    class="hr-atf__option"
                    :class="filter === opt.value && 'is-selected'"
                    :aria-selected="filter === opt.value ? 'true' : 'false'"
                    @click.stop="setFilter(opt.value)">
                <span class="truncate" x-text="opt.label"></span>
                <span class="hr-atf__count"
                      :class="opt.count === 0 && 'is-zero'"
                      x-text="opt.count"></span>
            </button>
        </template>
    </div>
</div>
