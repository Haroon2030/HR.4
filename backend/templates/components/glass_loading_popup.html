{# نافذة تحميل زجاجية — يتطلب Alpine: show (boolean)، loadingLabel (نص) #}
<template x-teleport="body">
    <div x-show="{{ show_expr|default:'loading' }}"
         x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="hr-glass-loading"
         role="status"
         aria-live="polite"
         :aria-busy="{{ show_expr|default:'loading' }} ? 'true' : 'false'">
        <div class="hr-glass-loading__veil" aria-hidden="true"></div>
        <div class="hr-glass-loading__card">
            <div class="hr-glass-loading__ring" aria-hidden="true">
                <i data-lucide="layers" class="w-4 h-4"></i>
            </div>
            <p class="hr-glass-loading__title">
                <span x-text="{{ label_expr|default:'loadingLabel' }}"></span>
                <span class="hr-glass-loading__dots" aria-hidden="true">
                    <span></span><span></span><span></span>
                </span>
            </p>
            <p class="hr-glass-loading__hint">لحظة واحدة — يتم تجهيز البيانات</p>
        </div>
    </div>
</template>
