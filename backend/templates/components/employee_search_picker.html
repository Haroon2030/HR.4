{# بحث واختيار موظف ذكي — يتطلب: employees، واختياري: input_name، label #}
{% with field_name=input_name|default:"employee_id" picker_label=label|default:"الموظف" %}
<div class="employee-search-picker hr-employee-smart-search" x-data="employeePickerBase({ pageSize: 8 })"
     x-init="employees = [
        {% for emp in employees %}
        { id: {{ emp.id }}, name: '{{ emp.name|escapejs }}', number: '{{ emp.employee_number|default:''|escapejs }}', id_number: '{{ emp.id_number|default:''|escapejs }}', dept: '{{ emp.department.name|default:''|escapejs }}', branch: '{{ emp.branch.name|default:''|escapejs }}' }{% if not forloop.last %},{% endif %}
        {% endfor %}
     ]; initEmployeePicker($data);{% if filter_employee %}
     selectEmployee({ id: {{ filter_employee.pk }}, name: '{{ filter_employee.name|escapejs }}', number: '{{ filter_employee.employee_number|default:""|escapejs }}', id_number: '{{ filter_employee.id_number|default:""|escapejs }}', dept: '{{ filter_employee.department.name|default:""|escapejs }}', branch: '{{ filter_employee.branch.name|default:""|escapejs }}' });{% endif %}">
    <input type="hidden" name="{{ field_name }}" :value="selected ? selected.id : ''">
    <label class="block text-xs font-medium text-slate-600 mb-1 flex items-center gap-1.5">
        <i data-lucide="search" class="w-3.5 h-3.5 text-primary-600"></i>
        {{ picker_label }}
        <span class="text-slate-400 font-normal">(اسم، رقم وظيفي، هوية)</span>
    </label>

    <template x-if="selected">
        <div class="flex items-center justify-between bg-gradient-to-l from-primary-50 to-white border border-primary-200 rounded-lg p-3 mb-2">
            <div class="flex items-center gap-3 min-w-0">
                <div class="w-10 h-10 bg-primary-600 text-white rounded-full flex items-center justify-center flex-shrink-0">
                    <i data-lucide="user-check" class="w-5 h-5"></i>
                </div>
                <div class="min-w-0">
                    <div class="font-bold text-slate-800 truncate" x-text="selected.name"></div>
                    <div class="text-xs text-slate-500 flex flex-wrap gap-x-2 mt-0.5">
                        <span x-show="selected.number" x-text="'#' + selected.number"></span>
                        <span x-show="selected.dept" x-text="selected.dept"></span>
                        <span x-show="selected.branch" x-text="selected.branch"></span>
                    </div>
                </div>
            </div>
            <button type="button" @click="clearSelection()"
                    class="text-xs font-semibold text-slate-600 hover:text-rose-600 px-2 py-1 rounded-lg hover:bg-rose-50">
                تغيير
            </button>
        </div>
    </template>

    <div x-show="!selected" x-cloak class="relative">
        <div class="hr-search-field">
            <i data-lucide="search" class="hr-search-field__icon w-4 h-4" aria-hidden="true"></i>
            <input type="text" x-model="query" x-ref="searchInput"
                @focus="onSearchFocus()"
                @input="onQueryInput()"
                @keydown.arrow-down.prevent="moveActive(1)"
                @keydown.arrow-up.prevent="moveActive(-1)"
                @keydown.enter.prevent="pickActive()"
                @keydown.escape.prevent="clearQuery()"
                placeholder="ابحث بالاسم، الرقم الوظيفي، أو الهوية…"
                autocomplete="off"
                class="hr-search-field__input"
                :aria-label="'{{ picker_label|escapejs }}'">
            <button type="button" x-show="query" x-cloak @click="clearQuery()"
                    class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-700">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        <p x-show="!hasQuery" class="hr-employee-smart-search__hint m-0 mt-1">ابدأ بالكتابة لعرض النتائج المطابقة.</p>

        <div x-show="showList && hasQuery && filtered.length > 0" x-cloak @click.away="showList = false"
             class="hr-employee-smart-search__results absolute mt-1 w-full bg-white border border-slate-200 rounded-lg shadow-xl overflow-hidden">
            <div class="max-h-56 overflow-y-auto">
                <template x-for="(emp, idx) in pagedItems" :key="emp.id">
                    <button type="button" @click="selectEmployee(emp)" @mouseenter="activeIndex = idx"
                            :class="activeIndex === idx ? 'bg-primary-50' : 'hover:bg-slate-50'"
                            class="w-full text-right px-3 py-2.5 border-b border-slate-100 flex items-center gap-2">
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-semibold text-slate-800 truncate" x-html="highlightMatch(emp.name)"></div>
                            <div class="text-xs text-slate-500" x-show="emp.number || emp.id_number">
                                <span x-show="emp.number" x-html="'وظيفي: ' + highlightMatch(emp.number)"></span>
                                <span x-show="emp.id_number" class="mr-2" x-html="'هوية: ' + highlightMatch(emp.id_number)"></span>
                            </div>
                        </div>
                    </button>
                </template>
            </div>
            <div x-show="totalPages > 1" class="flex justify-between items-center px-3 py-2 bg-slate-50 border-t text-xs">
                <button type="button" @click="prevPage()" :disabled="currentPage === 1" class="disabled:opacity-40">السابق</button>
                <span x-text="'صفحة ' + currentPage + ' / ' + totalPages"></span>
                <button type="button" @click="nextPage()" :disabled="currentPage === totalPages" class="disabled:opacity-40">التالي</button>
            </div>
        </div>

        <div x-show="showList && hasQuery && filtered.length === 0" x-cloak
             class="hr-employee-smart-search__results absolute mt-1 w-full bg-white border rounded-lg shadow-lg p-4 text-center text-sm text-slate-500">
            لا يوجد موظف مطابق
        </div>
    </div>

    {% if not employees %}
    <p class="mt-2 text-xs text-slate-500 text-center">لا بيانات</p>
    {% endif %}
</div>
{% endwith %}
