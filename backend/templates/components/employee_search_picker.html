{# بحث واختيار موظف — يتطلب: employees، واختياري: input_name، picker_label #}
{% with field_name=input_name|default:"employee_id" picker_label=label|default:"الموظف" %}
<div class="employee-search-picker" x-data="employeePickerField()" x-init="initPicker()">
    <input type="hidden" name="{{ field_name }}" :value="selected ? selected.id : ''">
    <label class="block text-xs font-medium text-slate-600 mb-1 flex items-center gap-1.5">
        <i data-lucide="search" class="w-3.5 h-3.5 text-primary-600"></i>
        {{ picker_label }}
        <span class="text-slate-400 font-normal">(اسم، رقم وظيفي، هوية)</span>
    </label>

    <template x-if="selected">
        <div class="flex items-center justify-between bg-gradient-to-l from-primary-50 to-white border border-primary-200 rounded-lg p-3 mb-2">
            <div class="flex items-center gap-3 min-w-0">
                <div class="w-10 h-10 bg-primary-600 text-white rounded-full flex items-center justify-center flex-shrink-0">
                    <i data-lucide="user-check" class="w-5 h-5"></i>
                </div>
                <div class="min-w-0">
                    <div class="font-bold text-slate-800 truncate" x-text="selected.name"></div>
                    <div class="text-xs text-slate-500 flex flex-wrap gap-x-2 mt-0.5">
                        <span x-show="selected.number" x-text="'#' + selected.number"></span>
                        <span x-show="selected.dept" x-text="selected.dept"></span>
                        <span x-show="selected.branch" x-text="selected.branch"></span>
                    </div>
                </div>
            </div>
            <button type="button" @click="clearSelection()"
                    class="text-xs font-semibold text-slate-600 hover:text-rose-600 px-2 py-1 rounded-lg hover:bg-rose-50">
                تغيير
            </button>
        </div>
    </template>

    <div x-show="!selected" x-cloak class="relative">
        <div class="relative">
            <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none"></i>
            <input type="text" x-model="query" x-ref="searchInput"
                @focus="showList = true" @click="showList = true"
                @input="showList = true; activeIndex = 0; currentPage = 1"
                @keydown.arrow-down.prevent="moveActive(1)"
                @keydown.arrow-up.prevent="moveActive(-1)"
                @keydown.enter.prevent="pickActive()"
                @keydown.escape="query = ''; showList = false"
                placeholder="ابحث في قائمة الموظفين…"
                autocomplete="off"
                class="w-full pr-10 pl-10 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 text-sm">
            <button type="button" x-show="query" @click="query = ''; $refs.searchInput.focus()"
                    class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>

        <div x-show="showList && filtered.length > 0" x-cloak @click.away="showList = false"
             class="absolute z-30 mt-1 w-full bg-white border border-slate-200 rounded-lg shadow-xl overflow-hidden">
            <div class="max-h-56 overflow-y-auto">
                <template x-for="(emp, idx) in pagedItems" :key="emp.id">
                    <button type="button" @click="selectEmployee(emp)" @mouseenter="activeIndex = idx"
                            :class="activeIndex === idx ? 'bg-primary-50' : 'hover:bg-slate-50'"
                            class="w-full text-right px-3 py-2.5 border-b border-slate-100 flex items-center gap-2">
                        <div class="flex-1 min-w-0">
                            <div class="text-sm font-semibold text-slate-800 truncate" x-text="emp.name"></div>
                            <div class="text-xs text-slate-500" x-show="emp.number || emp.id_number">
                                <span x-show="emp.number" x-text="'وظيفي: ' + emp.number"></span>
                                <span x-show="emp.id_number" class="mr-2" x-text="'هوية: ' + emp.id_number"></span>
                            </div>
                        </div>
                    </button>
                </template>
            </div>
            <div x-show="totalPages > 1" class="flex justify-between items-center px-3 py-2 bg-slate-50 border-t text-xs">
                <button type="button" @click="prevPage()" :disabled="currentPage === 1" class="disabled:opacity-40">السابق</button>
                <span x-text="'صفحة ' + currentPage + ' / ' + totalPages"></span>
                <button type="button" @click="nextPage()" :disabled="currentPage === totalPages" class="disabled:opacity-40">التالي</button>
            </div>
        </div>

        <div x-show="showList && query && filtered.length === 0" x-cloak
             class="absolute z-30 mt-1 w-full bg-white border rounded-lg shadow-lg p-4 text-center text-sm text-slate-500">
            لا يوجد موظف مطابق
        </div>
    </div>

    {% if not employees %}
    <p class="mt-2 text-xs text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
        لا يوجد موظفون نشطون — <a href="{% url 'web:add_employee' %}" class="underline font-semibold">أضف موظفاً</a> أولاً.
    </p>
    {% endif %}
</div>
{% endwith %}
