<!-- Stat Card Component -->
<div class="bg-white rounded-lg md:rounded-xl shadow-sm border border-slate-200 p-4 md:p-6">
    <div class="flex items-center justify-between mb-3 md:mb-4">
        <div class="w-10 h-10 md:w-12 md:h-12 bg-{{ color|default:'primary' }}-100 rounded-lg md:rounded-xl flex items-center justify-center">
            <i data-lucide="{{ icon }}" class="w-5 h-5 md:w-6 md:h-6 text-{{ color|default:'primary' }}-600"></i>
        </div>
        {% if trend %}
        <span class="text-xs md:text-sm font-medium {% if trend > 0 %}text-green-600{% else %}text-red-600{% endif %}">
            {% if trend > 0 %}+{% endif %}{{ trend }}%
        </span>
        {% endif %}
    </div>
    <h3 class="text-xl md:text-2xl font-bold text-slate-800 mb-1">{{ value }}</h3>
    <p class="text-xs md:text-sm text-slate-500">{{ label }}</p>
</div>
