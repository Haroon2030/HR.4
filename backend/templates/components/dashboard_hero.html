{% load custom_tags %}
<div class="hr-hero">
    <span class="hr-hero__glow" aria-hidden="true"></span>
    <span class="hr-hero__glow hr-hero__glow--secondary" aria-hidden="true"></span>
    <div class="hr-hero__inner">
        <div class="hr-hero__top">
            <span class="hr-hero__date">
                <i data-lucide="calendar-days" class="w-3.5 h-3.5"></i>
                {% now "l، j F Y" %}
            </span>
        </div>
        <div class="hr-hero__body">
            <span class="hr-hero__avatar" aria-hidden="true">
                <i data-lucide="user-round" class="w-6 h-6"></i>
            </span>
            <div class="hr-hero__content min-w-0">
                <p class="hr-hero__welcome-line">
                    <span class="hr-hero__greeting">مرحباً بك،</span>
                    <strong class="hr-hero__name">{{ request.user.get_full_name|default:request.user.username }}</strong>
                </p>
                {% if request.user.profile.role %}
                <span class="hr-hero__role-chip">
                    <i data-lucide="shield" class="w-3.5 h-3.5"></i>
                    {{ request.user.profile.role|role_arabic_name }}
                </span>
                {% endif %}
            </div>
        </div>
    </div>
</div>
