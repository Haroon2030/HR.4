{# تبويبات مشتركة بين طلبات العمليات وطلبات التوظيف #}
<div class="flex items-center gap-1 border-b border-slate-200 bg-white rounded-t-xl px-2 pt-2">
    <a href="{% url 'web:list_pending_actions' %}"
       class="px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors -mb-px
              {% if request.resolver_match.url_name == 'list_pending_actions' %}border-primary-600 text-primary-700 bg-white{% else %}border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50{% endif %}">
        <i data-lucide="list-checks" class="w-4 h-4 inline-block ml-1"></i>
        طلبات العمليات
        {% if pending_actions_count %}<span class="mr-1 px-2 py-0.5 bg-amber-500 text-white rounded-full text-xs">{{ pending_actions_count }}</span>{% endif %}
    </a>
    {% if request.user.is_superuser or request.user.managed_branches.exists %}
    <a href="{% url 'web:list_employment_requests' %}"
       class="px-4 py-2.5 text-sm font-semibold border-b-2 transition-colors -mb-px
              {% if request.resolver_match.url_name == 'list_employment_requests' %}border-primary-600 text-primary-700 bg-white{% else %}border-transparent text-slate-500 hover:text-slate-700 hover:bg-slate-50{% endif %}">
        <i data-lucide="clipboard-check" class="w-4 h-4 inline-block ml-1"></i>
        طلبات التوظيف
    </a>
    {% endif %}
</div>
