{% if size == 'md' %}
<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-bold {{ ui.badge_class }} {{ ui.badge_border_class }}">
    <i data-lucide="{{ ui.icon }}" class="w-3 h-3"></i> {{ ui.label }}
</span>
{% else %}
<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-bold {{ ui.badge_class }}">
    <i data-lucide="{{ ui.icon }}" class="w-3 h-3"></i> {{ ui.label }}
</span>
{% endif %}
