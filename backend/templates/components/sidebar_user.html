{% with display_name=user.get_full_name|default:user.username role_name=user.profile.role.name|default:"مستخدم" %}
<div class="hr-sidebar-user shrink-0">
    <div class="hr-sidebar-user__inner" {% if allow_collapse and not always_show %}x-show="sidebarOpen" x-cloak{% endif %}>
        <span class="hr-sidebar-user__avatar" aria-hidden="true">
            {{ display_name|slice:":1"|upper }}
        </span>
        <div class="hr-sidebar-user__meta min-w-0">
            <p class="hr-sidebar-user__name truncate" title="{{ display_name }}">{{ display_name }}</p>
            <p class="hr-sidebar-user__role truncate" title="{{ role_name }}">{{ role_name }}</p>
        </div>
    </div>
    {% if allow_collapse and not always_show %}
    <div class="hr-sidebar-user__collapsed" x-show="!sidebarOpen" x-cloak>
        <span class="hr-sidebar-user__avatar" title="{{ display_name }}">
            {{ display_name|slice:":1"|upper }}
        </span>
    </div>
    {% endif %}
</div>
{% endwith %}
