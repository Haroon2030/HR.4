<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}نظام الموارد البشرية{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/tailwind.min.css' %}">
    <script src="{% static 'js/alpine.min.js' %}" defer></script>
    <script src="{% static 'js/lucide.min.js' %}"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    {% if messages %}
    <div class="fixed top-4 left-1/2 -translate-x-1/2 z-50 space-y-2">
        {% for message in messages %}
        <div class="px-4 py-3 rounded-lg shadow-lg text-sm
            {% if message.tags == 'error' %}bg-red-100 text-red-800 border border-red-200
            {% elif message.tags == 'success' %}bg-green-100 text-green-800 border border-green-200
            {% else %}bg-blue-100 text-blue-800 border border-blue-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    <script>lucide.createIcons();</script>
</body>
</html>
