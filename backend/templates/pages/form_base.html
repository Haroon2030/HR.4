{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto space-y-3 md:space-y-4">
    <!-- Header -->
    <div class="flex items-center gap-3 md:gap-4">
        <a href="{% block back_url %}#{% endblock %}" class="hr-glass-back-btn" aria-label="رجوع">
            <i data-lucide="arrow-right" class="w-5 h-5"></i>
        </a>
    </div>

    <form method="post" class="space-y-3 md:space-y-4" {% block form_attrs %}{% endblock %}>
        {% csrf_token %}
        
        {% block form_content %}
        <!-- محتوى النموذج -->
        {% endblock %}

        <!-- Actions -->
        <div class="flex gap-3 sticky bottom-0 hr-glass-form py-3 -mx-3 px-3 md:static md:py-0 md:mx-0 md:px-0">
            <button type="submit" class="flex-1 md:flex-none px-4 py-2.5 md:px-6 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors font-medium text-sm md:text-base">
                {% block submit_text %}حفظ{% endblock %}
            </button>
            <a href="{% block cancel_url %}#{% endblock %}" class="flex-1 md:flex-none px-4 py-2.5 md:px-6 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition-colors font-medium text-center text-sm md:text-base">
                إلغاء
            </a>
        </div>
    </form>
</div>
{% endblock %}
