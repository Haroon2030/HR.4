{% comment %}أزرار تبويبات ملف الموظف — تُعرض حسب صلاحيات employee_tab_*.view{% endcomment %}
{% for tab in employee_tab_nav %}
{% if tab.visible %}
<a href="{% url 'web:view_employee' employee.id %}?tab={{ tab.key }}"
   role="tab"
   class="hr-tab-btn{% if tab.key == 'accruals' %} hr-tab-btn--emerald{% elif tab.key == 'termination' %} hr-tab-btn--rose{% endif %}{% if default_employee_tab == tab.key %} is-active{% endif %}">{{ tab.label }}</a>
{% endif %}
{% endfor %}
