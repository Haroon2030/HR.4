{% comment %}أزرار تبويبات ملف الموظف — تُعرض حسب صلاحيات employee_tab_*.view{% endcomment %}
{% for tab in employee_tab_nav %}
{% if tab.visible %}
<button type="button" role="tab" class="hr-tab-btn{% if tab.key == 'accruals' %} hr-tab-btn--emerald{% elif tab.key == 'termination' %} hr-tab-btn--rose{% endif %}"
    @click="activeTab='{{ tab.key }}'" :class="activeTab==='{{ tab.key }}' && 'is-active'">{{ tab.label }}</button>
{% endif %}
{% endfor %}
