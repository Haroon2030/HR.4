{% comment %}أزرار تبويبات ملف الموظف — Alpine (بدون HTMX){% endcomment %}
{% for tab in employee_tab_nav %}
{% if tab.visible %}
<button type="button" role="tab"
        @click="activeTab = '{{ tab.key }}'; $dispatch('employee-tab-changed', { tab: '{{ tab.key }}' })"
        :class="{ 'is-active': activeTab === '{{ tab.key }}' }"
        class="hr-tab-btn{% if tab.key == 'accruals' %} hr-tab-btn--emerald{% elif tab.key == 'termination' %} hr-tab-btn--rose{% endif %}">
    {{ tab.label }}
</button>
{% endif %}
{% endfor %}
