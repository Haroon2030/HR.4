<style>
    .hr-report { max-width: 80rem; margin-inline: auto; }

    .hr-report-top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
    }
    .hr-report-top h1 {
        margin: 0;
        font-size: 1.125rem;
        font-weight: 700;
        color: #0f172a;
    }
    .hr-report-crumb {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        font-size: 0.7rem;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 0.15rem;
    }
    .hr-report-crumb a { color: inherit; text-decoration: none; }
    .hr-report-crumb a:hover { color: #2563eb; }
    .hr-report-actions { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .hr-report-kpis {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
    }
    .hr-report-kpi {
        flex: 1 1 8rem;
        min-width: 7rem;
        padding: 0.5rem 0.75rem;
        border: 1px solid #e2e8f0;
        border-radius: 0.5rem;
        background: #fff;
    }
    .hr-report-kpi .lbl {
        margin: 0;
        font-size: 0.65rem;
        font-weight: 600;
        color: #64748b;
    }
    .hr-report-kpi .val {
        margin: 0.1rem 0 0;
        font-size: 1.1rem;
        font-weight: 700;
        line-height: 1.2;
        color: #0f172a;
    }
    .hr-report-kpi .sub {
        margin: 0.15rem 0 0;
        font-size: 0.6rem;
        font-weight: 600;
        color: #94a3b8;
    }

    .hr-report-filter {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 0.625rem;
        padding: 0.65rem 0.75rem;
    }
    .hr-report-filter-row {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: 0.5rem 0.65rem;
    }
    .hr-report-filter-row .fld {
        flex: 1 1 9rem;
        min-width: 8rem;
    }
    .hr-report-filter-row .fld--search { flex: 2 1 12rem; min-width: 10rem; }
    .hr-report-filter-row .fld--actions {
        flex: 0 0 auto;
        display: flex;
        gap: 0.35rem;
        align-items: center;
        margin-inline-start: auto;
    }
    .hr-report-lbl {
        display: block;
        margin-bottom: 0.2rem;
        font-size: 0.65rem;
        font-weight: 700;
        color: #475569;
    }
    .hr-report-field {
        display: block;
        width: 100%;
        box-sizing: border-box;
        padding: 0.4rem 0.55rem;
        font-size: 0.8125rem;
        font-weight: 600;
        color: #0f172a;
        border: 1px solid #e2e8f0;
        border-radius: 0.375rem;
        background: #fff;
    }
    .hr-report-field:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.12);
    }
    .hr-report-filter-adv {
        margin-top: 0.65rem;
        padding-top: 0.65rem;
        border-top: 1px dashed #e2e8f0;
        display: grid;
        gap: 0.65rem;
    }
    @media (min-width: 768px) {
        .hr-report-filter-adv {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
        .hr-report-filter-adv .span-2 { grid-column: span 2; }
    }
    .hr-report-filter-toggle {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.4rem 0.65rem;
        font-size: 0.75rem;
        font-weight: 700;
        color: #475569;
        border: 1px solid #e2e8f0;
        border-radius: 0.375rem;
        background: #f8fafc;
        cursor: pointer;
    }
    .hr-report-filter-toggle:hover { background: #f1f5f9; }
    .hr-report-filter-toggle.is-active {
        border-color: #93c5fd;
        background: #eff6ff;
        color: #1d4ed8;
    }
    .hr-report-filter-toggle .dot {
        width: 0.4rem;
        height: 0.4rem;
        border-radius: 999px;
        background: #2563eb;
    }

    .hr-report-tabs {
        display: flex;
        gap: 0.25rem;
        padding: 0.2rem;
        background: #f1f5f9;
        border-radius: 0.5rem;
        width: fit-content;
        max-width: 100%;
    }
    .hr-report-tab {
        padding: 0.4rem 0.85rem;
        font-size: 0.8125rem;
        font-weight: 700;
        color: #64748b;
        border: none;
        border-radius: 0.375rem;
        background: transparent;
        cursor: pointer;
        white-space: nowrap;
    }
    .hr-report-tab.is-active {
        background: #fff;
        color: #0f172a;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }
    .hr-report-tab .cnt {
        font-size: 0.65rem;
        font-weight: 600;
        color: #94a3b8;
        margin-inline-start: 0.25rem;
    }

    .hr-report-card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 0.625rem;
        overflow: hidden;
    }
    .hr-report-card-hd {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
        padding: 0.55rem 0.85rem;
        border-bottom: 1px solid #e2e8f0;
    }
    .hr-report-card-hd h2 {
        margin: 0;
        font-size: 0.875rem;
        font-weight: 700;
        color: #0f172a;
    }
    .hr-report-card-hd .meta {
        font-size: 0.7rem;
        font-weight: 600;
        color: #64748b;
    }

    .hr-report-tbl { width: 100%; border-collapse: collapse; font-size: 0.8125rem; }
    .hr-report-tbl thead th {
        padding: 0.5rem 0.65rem;
        text-align: right;
        font-size: 0.68rem;
        font-weight: 700;
        color: #64748b;
        background: #f8fafc;
        border-bottom: 1px solid #e2e8f0;
        white-space: nowrap;
    }
    .hr-report-tbl tbody td {
        padding: 0.45rem 0.65rem;
        border-bottom: 1px solid #f1f5f9;
        color: #0f172a;
        font-weight: 600;
        vertical-align: middle;
    }
    .hr-report-tbl tbody tr:hover { background: #f8fafc; }
    .hr-report-tbl tbody tr.row-warn { background: #fffbeb; }
    .hr-report-tbl .mono {
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        font-weight: 600;
    }
    .hr-report-badge {
        display: inline-flex;
        padding: 0.12rem 0.45rem;
        border-radius: 0.25rem;
        font-size: 0.65rem;
        font-weight: 700;
    }
    .hr-report-badge-ok { background: #ecfdf5; color: #047857; }
    .hr-report-badge-warn { background: #fffbeb; color: #b45309; }
    .hr-report-badge-muted { background: #f1f5f9; color: #475569; }
    .hr-report-badge-in { background: #ecfdf5; color: #047857; }
    .hr-report-badge-out { background: #eff6ff; color: #2563eb; }
    .hr-report-link { color: #2563eb; font-weight: 700; text-decoration: none; }
    .hr-report-link:hover { text-decoration: underline; }
    .hr-report-sub { display: block; font-size: 0.65rem; color: #64748b; font-family: ui-monospace, monospace; }
    .hr-report-pager {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        justify-content: center;
        padding: 0.65rem 0.85rem;
        border-top: 1px solid #e2e8f0;
    }
    .hr-report-pager a,
    .hr-report-pager span {
        padding: 0.3rem 0.75rem;
        font-size: 0.75rem;
        font-weight: 600;
        border: 1px solid #e2e8f0;
        border-radius: 0.375rem;
        color: #0f172a;
        text-decoration: none;
    }
    .hr-report-pager a:hover { background: #f8fafc; }
    .hr-report-empty {
        padding: 2rem 1rem;
        text-align: center;
        font-size: 0.8125rem;
        font-weight: 600;
        color: #64748b;
    }
    .hr-report-filter .employee-search-picker label span.text-slate-400 { display: none; }
    .hr-report-filter .employee-search-picker input[type="text"] {
        padding: 0.4rem 0.55rem 0.4rem 2rem;
        font-size: 0.8125rem;
    }
</style>
