{# نافذة إضافة/تعديل جهاز بصمة — مضغوطة مع تمرير داخلي وأزرار ثابتة #}
<div
    x-show="deviceModal"
    x-cloak
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="fixed inset-0 z-50 flex items-center justify-center p-3 sm:p-4 bg-slate-900/50 backdrop-blur-sm overflow-y-auto"
    @keydown.escape.window="deviceModal = false"
    role="dialog"
    aria-modal="true"
    aria-labelledby="device-modal-title"
>
    <div
        @click.outside="deviceModal = false"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95"
        x-transition:enter-end="opacity-100 scale-100"
        class="bg-white w-full max-w-md rounded-xl shadow-2xl border border-slate-200 flex flex-col my-auto max-h-[calc(100vh-1.5rem)]"
    >
        <div class="flex items-center justify-between gap-2 px-4 py-2.5 border-b border-slate-100 shrink-0">
            <div class="flex items-center gap-2 min-w-0">
                <div class="shrink-0 w-8 h-8 rounded-lg bg-slate-900 text-white flex items-center justify-center">
                    <i data-lucide="cpu" class="w-4 h-4"></i>
                </div>
                <div class="min-w-0">
                    <h3 id="device-modal-title" class="text-sm font-bold text-slate-900 leading-tight"
                        x-text="form.device_id ? 'تعديل جهاز' : 'إضافة جهاز'"></h3>
                    <p class="text-[10px] text-slate-500">ZKTeco · منفذ 4370</p>
                </div>
            </div>
            <button type="button" @click="deviceModal = false"
                class="shrink-0 p-1.5 rounded-lg text-slate-400 hover:bg-slate-100" aria-label="إغلاق">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>

        <form method="post" action="{% url 'web:biometric_device_save' %}" class="flex flex-col min-h-0 flex-1">
            {% csrf_token %}
            <input type="hidden" name="device_id" :value="form.device_id || ''">

            <div class="flex-1 min-h-0 overflow-y-auto overscroll-contain px-4 py-3 space-y-3">
                <div>
                    <label class="block text-[11px] font-medium text-slate-600 mb-1">اسم الجهاز</label>
                    <input type="text" name="name" x-model="form.name" required
                        placeholder="مثال: سكاي مول"
                        class="w-full rounded-lg border-slate-200 px-2.5 py-1.5 text-sm focus:ring-1 focus:ring-primary-500 focus:border-primary-500">
                </div>

                <div class="rounded-lg border border-slate-200 p-2.5 space-y-2">
                    <p class="text-[11px] font-semibold text-slate-700">اتصال الشبكة</p>
                    <div>
                        <label class="block text-[10px] text-slate-500 mb-0.5">IP</label>
                        <input type="text" name="ip_address" x-model="form.ip" required dir="ltr"
                            pattern="^(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?:\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}$"
                            placeholder="192.168.61.20"
                            class="w-full rounded-lg border-slate-200 px-2.5 py-1.5 text-sm font-mono focus:ring-1 focus:ring-primary-500">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-[10px] text-slate-500 mb-0.5">المنفذ</label>
                            <input type="number" name="port" x-model="form.port"
                                class="w-full rounded-lg border-slate-200 px-2 py-1.5 text-sm font-mono" placeholder="4370">
                        </div>
                        <div>
                            <label class="block text-[10px] text-slate-500 mb-0.5">Comm Key</label>
                            <input type="number" name="comm_key" x-model="form.comm_key" min="0"
                                class="w-full rounded-lg border-slate-200 px-2 py-1.5 text-sm font-mono" placeholder="0">
                        </div>
                    </div>
                </div>

                <div class="rounded-lg border border-indigo-100 bg-indigo-50/40 p-2.5 space-y-2">
                    <p class="text-[11px] font-semibold text-indigo-900">الربط بالفرع <span class="text-red-600">*</span></p>
                    {% if branches %}
                    <div>
                        <label class="block text-[10px] text-slate-600 mb-0.5">فرع موجود</label>
                        <select name="branch_id" x-model="form.branch_id"
                            class="w-full rounded-lg border-slate-200 bg-white text-sm py-1.5">
                            <option value="">— اختر —</option>
                            {% for b in branches %}
                            <option value="{{ b.pk }}">{{ b.name }} · {{ b.code }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <p class="text-center text-[10px] text-indigo-400">أو</p>
                    {% endif %}
                    <div>
                        <label class="block text-[10px] text-slate-600 mb-0.5">{% if branches %}فرع جديد{% else %}اسم الفرع{% endif %}</label>
                        <input type="text" name="branch_name" x-model="form.branch_name"
                            placeholder="مثال: خميس مشيط"
                            class="w-full rounded-lg border-slate-200 bg-white px-2.5 py-1.5 text-sm">
                    </div>
                    <a href="{% url 'web:list_branches' %}" target="_blank"
                        class="text-[10px] text-indigo-600 hover:underline">إدارة الفروع</a>
                </div>

                <div class="flex flex-wrap items-end gap-3">
                    <div class="flex-1 min-w-[140px]">
                        <label class="block text-[10px] text-slate-500 mb-0.5">ملاحظات</label>
                        <input type="text" name="notes" x-model="form.notes"
                            placeholder="اختياري"
                            class="w-full rounded-lg border-slate-200 px-2.5 py-1.5 text-sm">
                    </div>
                    <label class="inline-flex items-center gap-2 cursor-pointer pb-0.5">
                        <input type="checkbox" name="is_active" x-model="form.is_active" class="sr-only peer">
                        <span class="relative w-9 h-5 rounded-full bg-slate-200 peer-checked:bg-emerald-500 after:content-[''] after:absolute after:top-0.5 after:right-0.5 after:w-4 after:h-4 after:bg-white after:rounded-full after:shadow peer-checked:after:-translate-x-4 transition-colors"></span>
                        <span class="text-xs text-slate-700" x-text="form.is_active ? 'نشط' : 'معطّل'"></span>
                    </label>
                </div>
            </div>

            <div class="shrink-0 flex gap-2 px-4 py-3 border-t border-slate-100 bg-white rounded-b-xl">
                <button type="button" @click="deviceModal = false"
                    class="px-3 py-2 rounded-lg border border-slate-200 text-sm text-slate-600 hover:bg-slate-50">
                    إلغاء
                </button>
                <button type="submit"
                    class="flex-1 py-2 rounded-lg bg-primary-600 text-white text-sm font-semibold hover:bg-primary-700">
                    <span x-text="form.device_id ? 'حفظ' : 'تسجيل'"></span>
                </button>
            </div>
        </form>
    </div>
</div>
