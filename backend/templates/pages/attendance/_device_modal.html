{# نافذة جهاز بصمة — مضغوطة تقنية، حقول بحدود، تمرير بالماوس #}
<style>
    .zk-modal-field {
        display: block;
        width: 100%;
        border: 1px solid #94a3b8;
        border-radius: 0.375rem;
        background: #fff;
        padding: 0.3rem 0.5rem;
        font-size: 0.8125rem;
        line-height: 1.25rem;
        color: #0f172a;
        transition: border-color 0.15s, box-shadow 0.15s;
    }
    .zk-modal-field:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }
    .zk-modal-field[readonly] { background: #f8fafc; color: #64748b; }
    .zk-modal-scroll {
        overflow-y: auto;
        overflow-x: hidden;
        overscroll-behavior: contain;
        max-height: min(58vh, 26rem);
        -webkit-overflow-scrolling: touch;
    }
    .zk-grid-2col { display: grid; grid-template-columns: 4.25rem 1fr; gap: 0.2rem 0.35rem; align-items: center; }
    .zk-grid-lan { display: grid; grid-template-columns: 2.4rem 1fr; gap: 0.2rem 0.35rem; align-items: center; }
    .zk-grid-foot { display: grid; grid-template-columns: 2.75rem 1fr auto; gap: 0.2rem 0.35rem; align-items: center; }
    .zk-modal-fieldset { border: 1px solid #cbd5e1; border-radius: 0.375rem; padding: 0.35rem 0.5rem; margin: 0; }
    .zk-modal-fieldset legend { font-size: 9px; font-weight: 700; padding: 0 2px; }
</style>
<div
    x-show="deviceModal"
    x-cloak
    x-transition.opacity.duration.150ms
    class="fixed inset-0 z-50 flex items-start sm:items-center justify-center p-2 sm:p-3 bg-slate-900/55 overflow-y-auto overscroll-contain"
    @keydown.escape.window="deviceModal = false"
    role="dialog"
    aria-modal="true"
    aria-labelledby="device-modal-title"
>
    <div
        @click.outside="deviceModal = false"
        class="bg-white w-full max-w-[22rem] rounded-lg shadow-xl border border-slate-300 flex flex-col my-2 sm:my-auto shrink-0 max-h-[calc(100vh-1rem)]"
    >
        <div class="flex items-center justify-between gap-1.5 px-2.5 py-1.5 border-b border-slate-200 bg-slate-50 shrink-0">
            <div class="flex items-center gap-1.5 min-w-0">
                <span class="shrink-0 w-6 h-6 rounded bg-slate-800 text-white flex items-center justify-center">
                    <i data-lucide="cpu" class="w-3 h-3"></i>
                </span>
                <div class="min-w-0 leading-tight">
                    <h3 id="device-modal-title" class="text-xs font-bold text-slate-900"
                        x-text="form.device_id ? 'تعديل جهاز' : 'إضافة جهاز'"></h3>
                    <p class="text-[9px] text-slate-500 font-mono" dir="ltr">ZKTeco · :4370</p>
                </div>
            </div>
            <button type="button" @click="deviceModal = false"
                class="shrink-0 p-1 rounded text-slate-400 hover:bg-slate-200" aria-label="إغلاق">
                <i data-lucide="x" class="w-3.5 h-3.5"></i>
            </button>
        </div>

        <form method="post" action="{% url 'web:biometric_device_save' %}" class="flex flex-col min-h-0 flex-1 overflow-hidden">
            {% csrf_token %}
            <input type="hidden" name="original_device_id" :value="form.original_device_id || ''">

            <div class="zk-modal-scroll px-2.5 py-2 space-y-2 text-slate-800">
                <div class="zk-grid-2col">
                    <label class="text-[10px] font-semibold text-slate-600 font-mono" dir="ltr"
                        title="يطابق devices.list عند وكيل الفرع">ID</label>
                    <input type="number" name="device_id" x-model="form.device_id" min="1" step="1"
                        class="zk-modal-field font-mono" dir="ltr" placeholder="1">

                    <label class="text-[10px] font-semibold text-slate-600">الاسم</label>
                    <input type="text" name="name" x-model="form.name" required
                        class="zk-modal-field" placeholder="الواحة">
                </div>

                <fieldset class="zk-modal-fieldset space-y-1">
                    <legend class="text-slate-500 uppercase tracking-wide">LAN</legend>
                    <div class="zk-grid-lan">
                        <label class="text-[10px] text-slate-500 font-mono" dir="ltr">IP</label>
                        <input type="text" name="ip_address" x-model="form.ip" required dir="ltr"
                            pattern="^(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(?:\.(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}$"
                            class="zk-modal-field font-mono" placeholder="192.168.24.59">
                        <label class="text-[10px] text-slate-500 font-mono" dir="ltr">PORT</label>
                        <input type="number" name="port" x-model="form.port"
                            class="zk-modal-field font-mono w-20" placeholder="4370">
                        <label class="text-[10px] text-slate-500 font-mono" dir="ltr">KEY</label>
                        <input type="number" name="comm_key" x-model="form.comm_key" min="0"
                            class="zk-modal-field font-mono w-20" placeholder="0">
                    </div>
                </fieldset>

                <fieldset class="zk-modal-fieldset space-y-1 bg-indigo-50" style="border-color:#c7d2fe;">
                    <legend class="text-indigo-700">فرع <span class="text-red-600">*</span></legend>
                    {% if branches %}
                    <select name="branch_id" x-model="form.branch_id" class="zk-modal-field text-xs py-1">
                        <option value="">— فرع مسجّل —</option>
                        {% for b in branches %}
                        <option value="{{ b.pk }}">{{ b.name }} · {{ b.code }}</option>
                        {% endfor %}
                    </select>
                    <p class="text-[9px] text-center text-indigo-400 leading-none">أو</p>
                    {% endif %}
                    <input type="text" name="branch_name" x-model="form.branch_name"
                        class="zk-modal-field" placeholder="{% if branches %}فرع جديد{% else %}اسم الفرع{% endif %}">
                </fieldset>

                <div class="zk-grid-foot">
                    <label class="text-[10px] text-slate-500">ملاحظة</label>
                    <input type="text" name="notes" x-model="form.notes" class="zk-modal-field" placeholder="—">
                    <label class="inline-flex items-center gap-1 cursor-pointer justify-self-end">
                        <input type="checkbox" name="is_active" x-model="form.is_active" class="sr-only peer">
                        <span class="relative w-8 h-4 rounded-full bg-slate-300 peer-checked:bg-emerald-500 after:content-[''] after:absolute after:top-0.5 after:right-0.5 after:w-3 after:h-3 after:bg-white after:rounded-full after:shadow peer-checked:after:-translate-x-3.5 transition-all"></span>
                        <span class="text-[10px] font-medium" x-text="form.is_active ? 'ON' : 'OFF'"></span>
                    </label>
                </div>
            </div>

            <div class="shrink-0 flex gap-1.5 px-2.5 py-2 border-t border-slate-200 bg-slate-50">
                <button type="button" @click="deviceModal = false"
                    class="px-2.5 py-1.5 rounded-md border border-slate-300 bg-white text-xs text-slate-600 hover:bg-slate-100">
                    إلغاء
                </button>
                <button type="submit"
                    class="flex-1 py-1.5 rounded-md bg-primary-600 text-white text-xs font-bold hover:bg-primary-700 border border-primary-700">
                    <span x-text="form.device_id ? 'حفظ' : 'تسجيل'"></span>
                </button>
            </div>
        </form>
    </div>
</div>
