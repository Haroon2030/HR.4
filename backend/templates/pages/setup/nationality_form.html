{% extends "base.html" %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow-sm border border-slate-200 p-6">
        <h2 class="text-xl font-bold text-slate-900 mb-6">
            {% if nationality %}تعديل جنسية{% else %}إضافة جنسية جديدة{% endif %}
        </h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <input type="hidden" name="tab" value="{{ tab }}">
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">رقم الجنسية *</label>
                <input type="text" name="code" value="{{ nationality.code|default:'' }}" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">اسم الجنسية *</label>
                <input type="text" name="name" value="{{ nationality.name|default:'' }}" required
                    class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
            </div>

            <div class="flex gap-3 pt-4">
                <button type="submit" class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors">
                    حفظ
                </button>
                <a href="{% url 'web:list_branches' %}{% if tab %}#{{ tab }}{% endif %}" class="px-6 py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 transition-colors">
                    إلغاء
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
