<div class="hr-payroll-pipeline hr-payroll-pipeline--icons hr-payroll-pipeline--detailed" aria-label="إجراءات المسير التفصيلي">
    <div class="hr-payroll-icon-actions" role="toolbar" aria-label="إجراءات المسير التفصيلي">
        <button type="submit" form="payrollFilterForm"
                class="hr-payroll-icon-btn hr-payroll-icon-btn--view"
                title="عرض المسير التفصيلي المحفوظ"
                aria-label="عرض المسير التفصيلي المحفوظ">
            <i data-lucide="eye" class="w-4 h-4"></i>
        </button>

        {% if can_build %}
        <button type="submit" form="payrollCreateForm"
                formaction="{% url 'web:list_payroll_runs' %}" formmethod="post"
                name="build_kind" value="detailed"
                class="hr-payroll-icon-btn hr-payroll-icon-btn--build"
                title="{% if has_detailed_draft %}استبدال المسودة التفصيلية{% else %}بناء تفصيلي{% endif %}"
                aria-label="{% if has_detailed_draft %}استبدال المسودة التفصيلية{% else %}بناء تفصيلي{% endif %}"
                {% if has_detailed_draft %}onclick="return confirm('استبدال المسودة التفصيلية؟');"{% endif %}>
            <i data-lucide="{% if has_detailed_draft %}refresh-cw{% else %}git-branch{% endif %}" class="w-4 h-4"></i>
        </button>
        {% else %}
        <button type="button" disabled class="hr-payroll-icon-btn hr-payroll-icon-btn--build is-disabled"
                title="بناء تفصيلي" aria-label="بناء تفصيلي">
            <i data-lucide="git-branch" class="w-4 h-4"></i>
        </button>
        {% endif %}

        {% if show_table and has_draft_runs and financial_audit %}
        <span class="hr-payroll-icon-actions__sep" aria-hidden="true"></span>
        {% include "pages/payroll/_payroll_financial_audit_modal.html" with audit_modal_trigger=True audit_icon_only=True %}
        {% endif %}
    </div>

    <p class="hr-payroll-pipeline__hint">الفرع الجديد يتحمّل الراتب كاملاً للمنقولين.</p>
</div>
