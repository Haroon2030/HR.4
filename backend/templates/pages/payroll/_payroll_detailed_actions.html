<div class="hr-payroll-actions-unified hr-payroll-actions-unified--detailed" aria-label="إجراءات المسير التفصيلي">
    <div class="hr-payroll-actions-unified__head">
        <span class="hr-payroll-actions-unified__title">
            <i data-lucide="git-branch" class="w-4 h-4"></i>
            إجراءات المسير التفصيلي
        </span>
        <span class="hr-payroll-actions-unified__hint">① عرض ← ② بناء — توزيع تحمّل الفروع للمنقولين</span>
    </div>
    <div class="hr-payroll-actions-unified__grid hr-payroll-actions-unified__grid--single">
        <div class="hr-payroll-actions-unified__group">
            <span class="hr-payroll-actions-unified__group-label">التحضير والبناء</span>
            <div class="hr-payroll-actions-unified__buttons">
                <button type="submit"
                        form="payrollFilterForm"
                        class="hr-payroll-action-btn hr-payroll-action-btn--view"
                        title="عرض المسير التفصيلي المحفوظ">
                    <i data-lucide="eye" class="w-4 h-4"></i>
                    <span>① عرض المسير</span>
                </button>
                {% if can_build %}
                <button type="submit" form="payrollCreateForm" formaction="{% url 'web:list_payroll_runs' %}" formmethod="post" name="build_kind" value="detailed"
                        class="hr-payroll-action-btn hr-payroll-action-btn--detailed"
                        title="بناء مسير تفصيلي لموظفي النقل بين الفروع">
                    <i data-lucide="play" class="w-4 h-4"></i>
                    <span>② بناء المسير التفصيلي</span>
                </button>
                {% else %}
                <button type="button" disabled class="hr-payroll-action-btn hr-payroll-action-btn--detailed hr-payroll-action-btn--disabled">② بناء المسير التفصيلي</button>
                {% endif %}
            </div>
        </div>
    </div>
</div>
