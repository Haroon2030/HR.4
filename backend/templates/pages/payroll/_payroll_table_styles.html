<style>
    .payroll-lines-card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        overflow: hidden;
    }
    .payroll-lines-hd {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #e5e7eb;
    }
    .payroll-lines-hd h3 {
        margin: 0;
        font-size: 0.9375rem;
        font-weight: 700;
        color: #111;
    }
    .payroll-tbl {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.8125rem;
    }
    .payroll-tbl thead th {
        padding: 0.55rem 0.65rem;
        font-size: 0.65rem;
        font-weight: 700;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        border-bottom: 1px solid #e5e7eb;
        white-space: nowrap;
    }
    .payroll-tbl thead th.th-deduct {
        background: #fff5f5;
        color: #b91c1c;
    }
    .payroll-tbl thead th.th-earn {
        background: #f0fdf4;
        color: #047857;
    }
    .payroll-tbl thead th.th-net {
        background: #eff6ff;
        color: #1d4ed8;
    }
    .payroll-tbl tbody td {
        padding: 0.5rem 0.65rem;
        border-bottom: 1px solid #f3f4f6;
        vertical-align: middle;
    }
    .payroll-tbl tbody tr:hover {
        background: #fafafa;
    }
    .payroll-tbl tbody td.td-deduct {
        background: #fffbfb;
    }
    .payroll-tbl tbody td.td-earn {
        background: #fafff9;
    }
    .payroll-tbl tbody td.td-net {
        background: #f8fbff;
    }
    .payroll-tbl tfoot td {
        padding: 0.65rem;
        font-weight: 700;
        border-top: 2px solid #e5e7eb;
        background: #fafafa;
    }
    .payroll-tbl .col-num {
        text-align: left;
        white-space: nowrap;
    }
    .pay-money {
        display: inline-flex;
        align-items: baseline;
        gap: 0.2rem;
        font-variant-numeric: tabular-nums;
        font-feature-settings: "tnum";
        font-family: ui-monospace, "Segoe UI", Tahoma, sans-serif;
        font-weight: 700;
        line-height: 1.2;
    }
    .pay-money__val {
        letter-spacing: 0.02em;
    }
    .pay-money__cur {
        font-size: 0.65rem;
        font-weight: 600;
        opacity: 0.85;
    }
    .pay-money--neutral {
        color: #111;
    }
    .pay-money--neutral .pay-money__cur {
        color: #6b7280;
    }
    .pay-money--gross {
        color: #374151;
    }
    .pay-money--gross .pay-money__cur {
        color: #6b7280;
    }
    .pay-money--deduct {
        color: #dc2626;
    }
    .pay-money--deduct .pay-money__cur {
        color: #ef4444;
    }
    .pay-money--earn {
        color: #059669;
    }
    .pay-money--earn .pay-money__cur {
        color: #10b981;
    }
    .pay-money--net {
        color: #1d4ed8;
        font-size: 0.875rem;
    }
    .pay-money--net .pay-money__cur {
        color: #3b82f6;
    }
    .pay-money--empty {
        color: #9ca3af;
        font-weight: 600;
    }
    .pay-days {
        display: block;
        font-size: 0.6rem;
        font-weight: 600;
        color: #9ca3af;
        margin-top: 0.1rem;
    }

    /* ── أزرار بناء المسير (صف مستقل، عرض وارتفاع موحّد) ── */
    .hr-payroll-build-actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px solid #e2e8f0;
    }

    .hr-payroll-build-actions__hint {
        font-size: 0.75rem;
        font-weight: 600;
        color: #64748b;
        flex: 1 1 auto;
        min-width: 8rem;
    }

    .hr-payroll-build-actions__group {
        display: grid;
        grid-template-columns: repeat(2, minmax(9.5rem, 1fr));
        gap: 0.5rem;
        width: 100%;
        max-width: 22rem;
        flex: 0 0 auto;
        margin-inline-start: auto;
    }

    .hr-payroll-build-btn {
        min-height: 2.5rem;
        padding: 0.5rem 0.85rem;
        font-size: 0.8125rem;
        font-weight: 700;
        line-height: 1.2;
        border-radius: 0.5rem;
        border: 1px solid transparent;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.35rem;
        white-space: nowrap;
        cursor: pointer;
        transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .hr-payroll-build-btn__icon {
        width: 1rem;
        height: 1rem;
        flex-shrink: 0;
    }

    .hr-payroll-build-btn--primary {
        color: #fff;
        background: #2563eb;
        border-color: #1d4ed8;
        box-shadow: 0 1px 2px rgba(37, 99, 235, 0.2);
    }

    .hr-payroll-build-btn--primary:hover:not(:disabled) {
        background: #1d4ed8;
    }

    .hr-payroll-build-btn--detailed {
        color: #3730a3;
        background: #eef2ff;
        border-color: #c7d2fe;
    }

    .hr-payroll-build-btn--detailed:hover:not(:disabled) {
        background: #e0e7ff;
        border-color: #a5b4fc;
    }

    .hr-payroll-build-btn--disabled,
    .hr-payroll-build-btn:disabled {
        opacity: 0.55;
        cursor: not-allowed;
        box-shadow: none;
    }

    @media (max-width: 639px) {
        .hr-payroll-build-actions__group {
            max-width: none;
            margin-inline-start: 0;
        }
    }
</style>
