name: Django CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_ENV: development
      DJANGO_SETTINGS_MODULE: config.settings
      PYTHONUNBUFFERED: '1'
      # قاعدة SQLite في مجلد backend (Ubuntu CI — مسار مطلق لصيغة Django)
      DATABASE_URL: 'sqlite:////${{ github.workspace }}/backend/ci.sqlite3'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: Validate OpenAPI schema
        run: python manage.py spectacular --validate

      - name: Migrate (SQLite default in development)
        run: python manage.py migrate --noinput

      - name: Collect static (deploy smoke)
        run: python manage.py collectstatic --noinput

      - name: Run tests
        run: python manage.py test --verbosity 2
