# ═══════════════════════════════════════════════════════════════════════════════
# عند كل push إلى main/master يُنفَّذ بالترتيب:
#   1) check + check --deploy (إنتاج) + OpenAPI
#   2) migrate + collectstatic + مزامنة صلاحيات (نفس entrypoint)
#   3) كل الاختبارات
#   4) استدعاء webhook إعادة بناء/نشر السيرفر (إلزامي على main)
#
# على السيرفر (docker/entrypoint.sh): migrate → sync صلاحيات → collectstatic → Gunicorn
#
# GitHub → Settings → Secrets → Actions:
#   DEPLOY_WEBHOOK_URL   (إلزامي للنشر التلقائي) رابط Redeploy من Coolify/Dokploy/…
#   DEPLOY_WEBHOOK_AUTH  (اختياري) Bearer TOKEN
# ═══════════════════════════════════════════════════════════════════════════════
name: Django CI & Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'
  DJANGO_SETTINGS_MODULE: config.settings
  PYTHONUNBUFFERED: '1'

defaults:
  run:
    working-directory: backend

jobs:
  ci:
    name: فحص · بناء · اختبارات
    runs-on: ubuntu-latest
    env:
      DJANGO_ENV: development
      DEBUG: 'True'
      SECRET_KEY: ci-development-secret-key-not-used-in-production-xyz
      DATABASE_URL: sqlite:////${{ github.workspace }}/backend/ci.sqlite3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── فحوصات Django ─────────────────────────────────────────────────────
      - name: "[1/8] Django system check"
        run: python manage.py check

      - name: "[2/8] Production security check (check --deploy)"
        env:
          DJANGO_ENV: production
          SECRET_KEY: ci-production-check-secret-key-with-enough-length-and-variety-xyz
          DEBUG: 'False'
          ALLOWED_HOSTS: example.com,testserver
          CSRF_TRUSTED_ORIGINS: https://example.com
          USE_HTTPS: 'true'
          DATABASE_URL: sqlite:////${{ github.workspace }}/backend/ci-prod.sqlite3
          USE_R2: 'False'
        run: python manage.py check --deploy

      - name: "[3/8] Validate OpenAPI schema"
        run: python manage.py spectacular --validate

      # ── نفس خطوات entrypoint (محاكاة النشر) ───────────────────────────────
      - name: "[4/8] Migrate database"
        run: python manage.py migrate --noinput

      - name: "[5/8] Collect static files"
        run: python manage.py collectstatic --noinput

      - name: "[6/8] Sync permission registry"
        run: |
          python manage.py shell -c "
          import apps.core.web_views  # noqa: F401
          from apps.core.permissions_registry import sync_to_db
          m, p, n = sync_to_db(verbose=False)
          print(f'[permissions] CI sync: {m} modules, {p} perms ({n} new)')
          "

      # إعدادات الإنتاج تُختبر في [2/9] check --deploy (بدون migrate مكرر على SQLite)

      # ── اختبارات ─────────────────────────────────────────────────────────
      - name: "[7/8] Run test suite"
        run: python manage.py test --verbosity 2

      - name: "[8/8] CI summary"
        run: echo "✅ All CI steps passed — ready to deploy."

  deploy:
    name: نشر الإنتاج (webhook)
    needs: ci
    if: |
      needs.ci.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      secrets.DEPLOY_WEBHOOK_URL != ''
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy webhook (rebuild + entrypoint migrate on server)
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_AUTH: ${{ secrets.DEPLOY_WEBHOOK_AUTH }}
        run: |
          set -euo pipefail
          echo "==> CI نجح — استدعاء webhook النشر (migrate/collectstatic تلقائياً في entrypoint)..."
          if [ -n "${DEPLOY_WEBHOOK_AUTH:-}" ]; then
            curl -fsS --connect-timeout 30 --max-time 600 -X POST "$DEPLOY_WEBHOOK_URL" \
              -H "Authorization: ${DEPLOY_WEBHOOK_AUTH}" \
              -H "Content-Type: application/json" \
              -d '{"source":"github-actions","event":"'"${GITHUB_EVENT_NAME}"'","sha":"'"${GITHUB_SHA}"'"}'
          else
            curl -fsS --connect-timeout 30 --max-time 600 -X POST "$DEPLOY_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{"source":"github-actions","event":"'"${GITHUB_EVENT_NAME}"'","sha":"'"${GITHUB_SHA}"'"}'
          fi
          echo "==> تم إرسال طلب النشر بنجاح."

  deploy-hint:
    name: تلميح — فعّل النشر التلقائي
    needs: ci
    if: |
      needs.ci.result == 'success' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      secrets.DEPLOY_WEBHOOK_URL == ''
    runs-on: ubuntu-latest
    steps:
      - name: DEPLOY_WEBHOOK_URL غير مُعرّف
        run: |
          echo "::warning::النشر التلقائي معطّل — أضف DEPLOY_WEBHOOK_URL في GitHub Secrets"
          echo "1) Dokploy → تطبيق HR → Webhooks → انسخ رابط Deploy"
          echo "2) GitHub → Haroon2030/HR.4 → Settings → Secrets → Actions"
          echo "3) New secret: DEPLOY_WEBHOOK_URL = الرابط"
          echo "4) (اختياري) DEPLOY_WEBHOOK_AUTH إن طلب Dokploy توكناً"
